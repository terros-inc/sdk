# OpenCodeReview - GitHub Actions PR Auto-Review
#
# This workflow automatically reviews pull requests using OpenCodeReview
# and posts review comments directly on the PR.
#
# Triggers:
#   - PR opened, synchronized, reopened, marked ready for review (uses pull_request_target for fork secret access)
#   - Comment on PR containing '/open-code-review' or '@open-code-review'
#
# Required secrets:
#   OPENROUTER_API_KEY - OpenRouter API key for LLM access
#   vars.CODE_REVIEW_CLIENT_ID   - GitHub App client ID
#   secrets.CODE_REVIEW_PRIVATE_KEY - GitHub App private key (PEM)
#
# Note: GITHUB_TOKEN is automatically provided by GitHub Actions.

name: Open Code Review

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

on:
  # Use pull_request_target instead of pull_request so that secrets are
  # available even for PRs from forks. This is safe because OCR only reads
  # the diff and does not execute any code from the PR.
  pull_request_target:
    types: [opened, reopened, ready_for_review]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: read

jobs:
  code-review:
    runs-on: runs-on=${{ github.run_id }},cpu=2,ram=4,family=c8g,image=ubuntu24-full-arm64,extras=s3-cache,spot=true
    if: |
      (github.event_name == 'pull_request_target' && github.event.pull_request.draft == false) ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && startsWith(github.event.comment.body, '/open-code-review')) ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && startsWith(github.event.comment.body, '@open-code-review'))
    steps:
      - name: Get PR context
        id: pr-context
        if: github.event_name != 'pull_request_target'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const { data: pullRequest } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            })
            core.setOutput('base_ref', pullRequest.base.ref)
            core.setOutput('head_sha', pullRequest.head.sha)

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.CODE_REVIEW_CLIENT_ID }}
          private-key: ${{ secrets.CODE_REVIEW_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || steps.pr-context.outputs.head_sha }}

      - name: Run OpenCodeReview
        uses: terros-inc/actions/open-code-review@f23a19d900f6849274d1a351bf57619c9e292732
        with:
          openrouter_api_key: ${{ secrets.OPENROUTER_API_KEY }}
          github_token: ${{ steps.app-token.outputs.token }}
          base_ref: origin/${{ github.event.pull_request.base.ref || steps.pr-context.outputs.base_ref }}
          head_sha: ${{ github.event.pull_request.head.sha || steps.pr-context.outputs.head_sha }}
          pr_number: ${{ github.event.pull_request.number || github.event.issue.number }}
          reasoning: true
